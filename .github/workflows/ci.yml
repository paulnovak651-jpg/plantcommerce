name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check current doc contract
        run: node scripts/check-current-doc-contract.mjs

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
